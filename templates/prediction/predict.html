<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict EV Energy Demand</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4f8cff 0%, #22c55e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .predict-container {
            max-width: 430px;
            width: 100%;
            margin: 60px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.10);
            padding: 40px 38px 32px 38px;
            z-index: 1;
            position: relative;
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
            backdrop-filter: blur(2.5px);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        h2 {
            color: #2563d8;
            margin-bottom: 28px;
            text-align: center;
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .result {
            margin-top: 24px;
            text-align: center;
            font-size: 1.15em;
            color: #2563d8;
            font-weight: 600;
            background: #e7fbe7;
            border-radius: 8px;
            padding: 12px 0;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            color: #4f8cff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05em;
            letter-spacing: 0.5px;
            background: #e3edff;
            padding: 10px 28px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(79,140,255,0.10);
        }
        .back-link:hover {
            background: #c7dbfa;
            color: #2563d8;
            text-decoration: underline;
            box-shadow: 0 4px 16px rgba(34,197,94,0.10);
        }
        @media (max-width: 600px) {
            .predict-container {
                padding: 22px 4vw 16px 4vw;
                max-width: 98vw;
            }
            h2 {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="predict-container shadow-lg">
        <h2>Predict EV Energy Demand</h2>
        <form method="post" class="w-100">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Vehicle ID:</label>
                <input type="text" name="Vehicle_ID" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Battery Type:</label>
                <input type="text" name="Battery_Type" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Vehicle Type:</label>
                <input type="text" name="Vehicle_Type" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Ambient Temperature:</label>
                <input type="number" step="any" name="Ambient_Temperature" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Distance Driven (km):</label>
                <input type="number" step="any" name="Distance_Driven_km" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">State of Charge (%):</label>
                <input type="number" step="any" name="State_of_Charge_%" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Battery Capacity (kWh):</label>
                <input type="number" step="any" name="Battery_Capacity_kWh" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Current Speed (kmph):</label>
                <input type="number" step="any" name="Current_Speed_kmph" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Energy Consumed (kWh):</label>
                <input type="number" step="any" name="Energy_Consumed_kWh" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">Predict</button>
        </form>
        {% if prediction is not None %}
            <div class="result">
                Prediction: {{ prediction }}
            </div>
        {% endif %}
        <a href="{% url 'user_home' %}" class="back-link">Back</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
