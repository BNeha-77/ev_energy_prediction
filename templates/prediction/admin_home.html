<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Home - EV Energy Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4f8cff 0%, #22c55e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-card {
            max-width: 420px;
            width: 100%;
            margin: 60px auto;
            background: rgba(255,255,255,0.97);
            border-radius: 1rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.10);
            padding: 38px 38px 30px 38px;
            text-align: center;
            backdrop-filter: blur(2.5px);
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .section-title {
            color: #2563d8;
            font-size: 1.13em;
            margin-top: 32px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .info {
            color: #2563d8;
            margin-bottom: 16px;
            font-size: 1em;
            background: #e7fbe7;
            border-radius: 8px;
            padding: 8px 0;
        }
        .btn-primary, .btn-danger {
            background-color: #2563d8 !important;
            border-color: #2563d8 !important;
        }
        .btn-primary:hover, .btn-danger:hover {
            background-color: #174ea6 !important;
            border-color: #174ea6 !important;
        }
        @media (max-width: 600px) {
            .admin-card {
                padding: 24px 4vw 18px 4vw;
                max-width: 98vw;
            }
        }
    </style>
</head>
<body>
    <div class="admin-card shadow-lg">
        <h2 class="mb-4 text-primary fw-bold">Admin Dashboard</h2>
        <div class="section-title">User Management</div>
        <div class="info">View and remove users from the system.</div>
        <a href="{% url 'user_list' %}" class="btn btn-primary btn-lg w-100 mb-3 fw-semibold">Manage Users</a>
        <div class="section-title">Session</div>
        <a href="{% url 'logout' %}" class="btn btn-danger btn-lg w-100 fw-semibold">Logout</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
