<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - EV Energy Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4f8cff 0%, #2563d8 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 1.2rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            padding: 48px 38px 36px 38px;
            z-index: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
            backdrop-filter: blur(2.5px);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .login-logo {
            width: 70px;
            height: 70px;
            margin-bottom: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f8cff 0%, #2563d8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(34,197,94,0.10);
        }
        .login-logo svg {
            width: 44px;
            height: 44px;
            display: block;
        }
        h2 {
            color: #2563d8;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .form-label {
            font-weight: 600;
            color: #2563d8;
        }
        .form-control:focus {
            border-color: #4f8cff;
            box-shadow: 0 0 0 0.2rem rgba(79,140,255,.15);
        }
        .btn-primary, .btn-admin {
            background-color: #2563d8 !important;
            border-color: #2563d8 !important;
            font-weight: 600;
            border-radius: 8px;
            padding: 12px 0;
            transition: background 0.2s;
        }
        .btn-primary:hover, .btn-admin:hover {
            background-color: #174ea6 !important;
            border-color: #174ea6 !important;
        }
        .btn-admin {
            margin-top: 10px;
            width: 100%;
        }
        .register-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            color: #4f8cff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05em;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .register-link:hover {
            color: #2563d8;
            text-decoration: underline;
        }
        .divider {
            text-align: center;
            margin: 18px 0 10px 0;
            color: #aaa;
            font-size: 0.95em;
        }
        @media (max-width: 500px) {
            .login-card {
                padding: 28px 8vw 24px 8vw;
                max-width: 98vw;
            }
            .login-logo {
                width: 54px;
                height: 54px;
            }
            h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="login-card shadow-lg">
        <div class="login-logo">
            <svg viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="20" fill="#fff" opacity="0.9"/>
                <rect x="10" y="15" width="20" height="10" rx="5" fill="#4f8cff"/>
                <rect x="16" y="12" width="8" height="6" rx="3" fill="#22c55e"/>
                <rect x="13" y="25" width="4" height="4" rx="2" fill="#2563d8"/>
                <rect x="23" y="25" width="4" height="4" rx="2" fill="#2563d8"/>
            </svg>
        </div>
        <h2>Login</h2>
        <form method="post" class="w-100 mb-2">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 fw-semibold">Login</button>
        </form>
        <a href="{% url 'register' %}" class="register-link">Don't have an account? Register</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
