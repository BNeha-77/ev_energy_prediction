<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Preprocess Dataset - EV Energy Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4f8cff 0%, #22c55e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preprocess-container {
            max-width: 420px;
            width: 100%;
            margin: 70px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.10);
            padding: 38px 38px 30px 38px;
            text-align: center;
            position: relative;
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
            backdrop-filter: blur(2.5px);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        h2 {
            color: #2563d8;
            margin-bottom: 28px;
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .rows-info {
            font-size: 1.13em;
            margin-bottom: 18px;
            color: #2563d8;
        }
        .success-msg {
            margin: 18px 0 10px 0;
            color: #15803d;
            background: #e7fbe7;
            border-radius: 8px;
            padding: 12px 0;
            font-size: 1.08em;
            font-weight: 600;
        }
        .back-link {
            display: inline-block;
            margin-top: 22px;
            color: #4f8cff;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 8px;
            background: #e3edff;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(79,140,255,0.10);
            font-size: 1.05em;
        }
        .back-link:hover {
            background: #c7dbfa;
            color: #2563d8;
            text-decoration: underline;
            box-shadow: 0 4px 16px rgba(34,197,94,0.10);
        }
        @media (max-width: 600px) {
            .preprocess-container {
                padding: 22px 4vw 16px 4vw;
                max-width: 98vw;
            }
            h2 {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="preprocess-container shadow-lg">
        <h2>Preprocess Dataset</h2>
        <div class="success-msg">
            Dataset preprocessing completed successfully!
        </div>
        <div class="rows-info">Rows before: <b>{{ before }}</b></div>
        <div class="rows-info">Rows after: <b>{{ after }}</b></div>
        <a href="{% url 'user_home' %}" class="back-link btn btn-outline-primary fw-semibold px-4 mt-3">Back</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
