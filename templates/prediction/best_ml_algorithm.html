<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Best ML Algorithm - EV Energy Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4f8cff 0%, #22c55e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container-custom {
            max-width: 500px;
            width: 100%;
            margin: 60px auto;
            background: rgba(255,255,255,0.97);
            border-radius: 1rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.10);
            padding: 40px 38px 32px 38px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(2.5px);
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .algo {
            color: #22c55e;
            font-size: 1.25em;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .confidence {
            color: #2563d8;
            font-size: 1.13em;
            margin-bottom: 18px;
            font-weight: 500;
        }
        .map-img {
            max-width: 100%;
            margin: 18px 0;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(79,140,255,0.08);
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 18px 0 0 0;
        }
        li {
            background: #e3edff;
            margin: 8px auto;
            padding: 11px 0;
            border-radius: 7px;
            color: #2563d8;
            font-weight: 600;
            max-width: 320px;
            font-size: 1.05em;
            letter-spacing: 0.2px;
            box-shadow: 0 1px 4px rgba(79,140,255,0.06);
        }
        .best-msg {
            margin-top: 28px;
            font-size: 1.18em;
            color: #15803d;
            font-weight: 700;
            background: #e7fbe7;
            border-radius: 10px;
            padding: 14px 0;
            letter-spacing: 0.2px;
        }
        @media (max-width: 600px) {
            .container-custom {
                padding: 22px 4vw 16px 4vw;
                max-width: 98vw;
            }
        }
    </style>
</head>
<body>
    <div class="container-custom shadow-lg">
        <h2 class="mb-4 text-primary fw-bold">Best ML Algorithm</h2>
        <div class="algo">{{ best_algo }}</div>
        <div class="confidence">Confidence Level: {{ confidence }}%</div>
        <img src="data:image/png;base64,{{ map_img }}" class="map-img" alt="Algorithm Confidence Map" />
        <ul class="mb-3">
            {% for name, acc in results.items %}
                <li>{{ name }}: {{ acc|floatformat:2 }}</li>
            {% endfor %}
        </ul>
        <div class="best-msg mb-3">
            <span>{{ best_algo }}</span> is the best algorithm for your dataset.
        </div>
        <a href="{% url 'ml_algorithms' %}" class="btn btn-outline-primary fw-semibold px-4">Back</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
