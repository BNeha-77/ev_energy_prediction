<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ML Algorithms - EV Energy Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4f8cff 0%, #22c55e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .algo-container {
            max-width: 420px;
            width: 100%;
            margin: 60px auto;
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.10);
            padding: 38px 38px 30px 38px;
            text-align: center;
            backdrop-filter: blur(2.5px);
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        h2 {
            color: #2563d8;
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }
        .algo-btn {
            display: block;
            width: 80%;
            margin: 14px auto;
            padding: 12px 0;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.08em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(79,140,255,0.10);
        }
        .algo-btn.lr { background: #4f8cff; }
        .algo-btn.lr:hover { background: #2563d8; }
        .algo-btn.rf { background: #22c55e; }
        .algo-btn.rf:hover { background: #15803d; }
        .algo-btn.svm { background: #ff9800; }
        .algo-btn.svm:hover { background: #ff7043; }
        .algo-btn.nb { background: #a259e6; }
        .algo-btn.nb:hover { background: #7c3aed; }
        .algo-btn.dt { background: #14b8a6; }
        .algo-btn.dt:hover { background: #0d9488; }
        .algo-btn.knn { background: #ec4899; }
        .algo-btn.knn:hover { background: #be185d; }
        .back-link {
            display: inline-block;
            margin-top: 22px;
            color: #4f8cff;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 8px;
            background: #e3edff;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(79,140,255,0.10);
            font-size: 1.05em;
        }
        .back-link:hover {
            background: #c7dbfa;
            color: #2563d8;
            text-decoration: underline;
            box-shadow: 0 4px 16px rgba(34,197,94,0.10);
        }
        @media (max-width: 600px) {
            .algo-container {
                padding: 22px 4vw 16px 4vw;
                max-width: 98vw;
            }
            h2 {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="algo-container shadow-lg">
        <h2>Choose ML Algorithm</h2>
        <a href="{% url 'run_ml' 'Logistic Regression' %}" class="algo-btn lr fw-semibold">Logistic Regression</a>
        <a href="{% url 'run_ml' 'Random Forest' %}" class="algo-btn rf fw-semibold">Random Forest</a>
        <a href="{% url 'run_ml' 'SVM' %}" class="algo-btn svm fw-semibold">Support Vector Machine</a>
        <a href="{% url 'run_ml' 'KNN' %}" class="algo-btn knn fw-semibold">K-Nearest Neighbors</a>
        <a href="{% url 'run_ml' 'Best' %}" class="algo-btn best fw-semibold" style="background:#f59e42;">Best Algorithm (Auto Select)</a>
        <a href="{% url 'user_home' %}" class="back-link">Back</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
