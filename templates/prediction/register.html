<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration - EV Energy Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #4f8cff 0%, #22c55e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s;
        }
        .register-container {
            max-width: 400px;
            width: 100%;
            margin: 70px auto;
            background: rgba(255,255,255,0.97);
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.10);
            padding: 44px 36px 32px 36px;
            z-index: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
            backdrop-filter: blur(2.5px);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        h2 {
            color: #2563d8;
            margin-bottom: 28px;
            text-align: center;
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .login-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            color: #4f8cff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05em;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .login-link:hover {
            color: #2563d8;
            text-decoration: underline;
        }
        .info-msg {
            margin-top: 18px;
            color: #15803d;
            font-size: 1.05em;
            text-align: center;
            background: #e7fbe7;
            border-radius: 8px;
            padding: 12px 0;
            font-weight: 600;
        }
        @media (max-width: 500px) {
            .register-container {
                padding: 28px 8vw 24px 8vw;
                max-width: 98vw;
            }
            h2 {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="register-container shadow-lg">
        <h2>User Registration</h2>
        <form method="post" class="w-100">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 fw-semibold">Register</button>
        </form>
        <a href="{% url 'login' %}" class="login-link">Already have an account? Login</a>
        <div class="info-msg">
            Please fill in all fields to create your account.
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
