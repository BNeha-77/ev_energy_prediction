<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EV Energy Prediction - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4f8cff 0%, #2563d8 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .home-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 1.2rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
            padding: 48px 38px 36px 38px;
            z-index: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
            backdrop-filter: blur(2.5px);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .home-logo {
            width: 70px;
            height: 70px;
            margin-bottom: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f8cff 0%, #2563d8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(34,197,94,0.10);
        }
        .home-logo svg {
            width: 44px;
            height: 44px;
            display: block;
        }
        h2 {
            color: #2563d8;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .btn-main {
            background-color: #2563d8 !important;
            border-color: #2563d8 !important;
            font-weight: 600;
            border-radius: 8px;
            padding: 12px 0;
            transition: background 0.2s;
            width: 100%;
            margin-bottom: 18px;
        }
        .btn-main:hover {
            background-color: #174ea6 !important;
            border-color: #174ea6 !important;
        }
    </style>
</head>
<body>
    <div class="home-card shadow-lg">
        <div class="home-logo">
            <svg viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="20" fill="#fff" opacity="0.9"/>
                <rect x="10" y="15" width="20" height="10" rx="5" fill="#4f8cff"/>
                <rect x="16" y="12" width="8" height="6" rx="3" fill="#22c55e"/>
                <rect x="13" y="25" width="4" height="4" rx="2" fill="#2563d8"/>
                <rect x="23" y="25" width="4" height="4" rx="2" fill="#2563d8"/>
            </svg>
        </div>
        <h2>Welcome</h2>
        <a href="{% url 'login' %}" class="btn btn-main">User Login</a>
        <a href="/admin/login/?next=/admin/" class="btn btn-main">Admin Login</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
