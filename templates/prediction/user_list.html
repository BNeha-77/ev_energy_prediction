<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4f8cff 0%, #e3edff 100%);
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container-custom {
            max-width: 700px;
            width: 100%;
            margin: 60px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.10);
            padding: 38px 38px 30px 38px;
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
            backdrop-filter: blur(2.5px);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        h2 {
            color: #2563d8;
            font-size: 2em;
            font-weight: 700;
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }
        .no-users {
            text-align: center;
            color: #6b7280;
            margin: 24px 0;
            font-size: 1.08em;
        }
        @media (max-width: 800px) {
            .container-custom {
                padding: 18px 2vw 14px 2vw;
                max-width: 98vw;
            }
            h2 {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container-custom shadow-lg">
        <h2>User List</h2>
        {% if users %}
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.username }}</td>
                        <td>{{ user.email }}</td>
                        <td>
                            <a href="{% url 'delete_user' user.id %}" class="btn btn-sm btn-danger fw-semibold"
                               onclick="return confirm('Are you sure you want to delete this user?');">
                                🗑️ Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <div class="no-users">
            No users found.
        </div>
        {% endif %}
        <div class="text-center">
            <a href="{% url 'admin_home' %}" class="btn btn-primary fw-semibold mt-3">⬅ Back to Admin Home</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
