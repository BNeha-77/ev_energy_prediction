<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ algo }} - ML Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4f8cff 0%, #22c55e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container-custom {
            max-width: 500px;
            width: 100%;
            margin: 60px auto;
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.10);
            padding: 40px 38px 32px 38px;
            text-align: center;
            position: relative;
            animation: floatIn 0.8s cubic-bezier(.68,-0.55,.27,1.55);
            backdrop-filter: blur(2.5px);
        }
        @keyframes floatIn {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        h2 {
            color: #2563d8;
            margin-bottom: 28px;
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .result-label {
            color: #4f8cff;
            font-weight: 600;
            margin-top: 18px;
            margin-bottom: 6px;
            font-size: 1.08em;
            letter-spacing: 0.2px;
        }
        .result-value {
            background: #e3edff;
            border-radius: 7px;
            padding: 12px 0;
            color: #2563d8;
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 1.13em;
        }
        pre {
            background: #e3edff;
            border-radius: 7px;
            padding: 14px;
            color: #2d3a4b;
            font-size: 1em;
            overflow-x: auto;
            margin-bottom: 0;
        }
        .cm-img {
            max-width: 100%;
            margin: 14px 0;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(79,140,255,0.08);
        }
        .algo-msg {
            margin-top: 24px;
            font-size: 1.13em;
            color: #15803d;
            font-weight: 700;
            background: #e7fbe7;
            border-radius: 10px;
            padding: 12px 0;
            letter-spacing: 0.2px;
        }
        .back-link {
            display: inline-block;
            margin-top: 22px;
            color: #4f8cff;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 8px;
            background: #e3edff;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(79,140,255,0.10);
            font-size: 1.05em;
        }
        .back-link:hover {
            background: #c7dbfa;
            color: #2563d8;
            text-decoration: underline;
            box-shadow: 0 4px 16px rgba(34,197,94,0.10);
        }
        @media (max-width: 600px) {
            .container-custom {
                padding: 22px 4vw 16px 4vw;
                max-width: 98vw;
            }
            h2 {
                font-size: 1.3em;
            }
            .cm-img {
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container-custom shadow-lg">
        <h2>{{ algo }} Results</h2>
        <div class="result-label">Accuracy:</div>
        <div class="result-value">{{ acc }}</div>
        <div class="result-label">Confusion Matrix:</div>
        <img src="data:image/png;base64,{{ cm_img }}" class="cm-img" alt="Confusion Matrix" />
        <div class="result-label">Classification Report:</div>
        <pre>{{ cr }}</pre>
        <div class="algo-msg">
            You are viewing results for <span>{{ algo }}</span>.
        </div>
        <a href="{% url 'ml_algorithms' %}" class="back-link btn btn-outline-primary fw-semibold px-4 mt-3">Back</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
